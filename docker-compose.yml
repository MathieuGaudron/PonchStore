services:
  db:
    image: mysql:8.0
    container_name: ponchstore-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: ponchstore-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/var/www/api
    ports:
      - "8080:8000"

  front:
    build: ./front
    container_name: ponchstore-front
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./front:/app
    ports:
      - "3000:5173"

volumes:
  db_data:
